  <!-- Mouthpart -->
  <line x1="32" y1="22" x2="32" y2="18" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 8 legs -->
  <line x1="24" y1="28" x2="18" y2="24" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="17" y2="31" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="36" x2="18" y2="38" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="40" x2="19" y2="44" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="28" x2="46" y2="24" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="47" y2="31" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="36" x2="46" y2="38" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="40" x2="45" y2="44" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Red dot -->
  <circle cx="32" cy="32" r="3" fill="#CC0000" opacity="0.6"/>

</svg>